      - "3017:3017"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  carrier-data:
    driver: local
  invoice-data:
    driver: local
  docvault-data:
    driver: local
  docvault-uploads:
    driver: local
  dispatch-data:
    driver: local
  dock-data:
    driver: local
  settlements-data:
    driver: local
  rate-data:
    driver: local
  shipment-data:
    driver: local
