      - NODE_ENV=production
    restart: unless-stopped

  shipment-management:
    build:
      context: .
      dockerfile: apps/shipment-management/Dockerfile
    ports:
      - "3009:3009"
    volumes:
      - shipment-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  ifta-calculator:
    build:
      context: .
      dockerfile: apps/ifta-calculator/Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  detention-calculator:
    build:
      context: .
      dockerfile: apps/detention-calculator/Dockerfile
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  margin-calculator:
    build:
      context: .
      dockerfile: apps/margin-calculator/Dockerfile
    ports:
      - "3012:3012"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  deadhead-calculator:
    build:
      context: .
      dockerfile: apps/deadhead-calculator/Dockerfile
    ports:
      - "3013:3013"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  rate-con-generator:
    build:
      context: .
