# Warp Tools — Docker Compose
#
# Run a specific system:
#   docker compose up carrier-management
#
# Run all systems:
#   docker compose up

services:
  carrier-management:
    build:
      context: .
      dockerfile: apps/carrier-management/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - carrier-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  invoice-tracker:
    build:
      context: .
      dockerfile: apps/invoice-tracker/Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - invoice-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  document-vault:
    build:
      context: .
      dockerfile: apps/document-vault/Dockerfile
    ports:
      - "3004:3004"
    volumes:
      - docvault-data:/app/data
      - docvault-uploads:/app/uploads
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  load-dispatch:
    build:
      context: .
      dockerfile: apps/load-dispatch/Dockerfile
    ports:
      - "3005:3005"
    volumes:
      - dispatch-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  dock-scheduler:
    build:
      context: .
      dockerfile: apps/dock-scheduler/Dockerfile
    ports:
      - "3006:3006"
    volumes:
      - dock-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  driver-settlements:
    build:
      context: .
      dockerfile: apps/driver-settlements/Dockerfile
    ports:
      - "3007:3007"
    volumes:
      - settlements-data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  rate-management:
    build:
      context: .
      dockerfile: apps/rate-management/Dockerfile
    ports:
      - "3008:3008"
    volumes:
      - rate-data:/app/data
